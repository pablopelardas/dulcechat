<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DulceChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .header {
      background: #ec4899;
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .message ul, .message ol { margin: 4px 0; padding-left: 20px; }
    .message li { margin: 2px 0; }
    .message p { margin: 4px 0; }
    .message strong { font-weight: 600; }
    .message.user {
      align-self: flex-end;
      background: #ec4899;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      gap: 8px;
    }
    .input-area input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    .input-area input:focus { border-color: #ec4899; }
    .input-area button {
      background: #ec4899;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    .input-area button:hover { background: #db2777; }
    .input-area button:disabled { background: #d1d5db; cursor: default; }
  </style>
</head>
<body>
  <div class="header">DulceChat</div>
  <div class="messages" id="messages">
    <div class="message assistant">Hola! Soy DulceChat. En que puedo ayudarte?</div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Escribi tu mensaje..." autocomplete="off">
    <button id="send">Enviar</button>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    const params = new URLSearchParams(window.location.search);
    const authToken = params.get('token') || '';
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}/ws`;

    let ws;

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        sendBtn.disabled = false;
        if (authToken) {
          ws.send(JSON.stringify({ text: '__auth__', authToken }));
        }
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        addMessage(data.text, 'assistant');
        sendBtn.disabled = false;
      };

      ws.onerror = () => {};

      ws.onclose = () => {
        sendBtn.disabled = true;
        setTimeout(connect, 2000);
      };
    }

    connect();

    function simpleMarkdown(text) {
      // Escape HTML first
      var safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Bold: **text**
      safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Unordered lists: lines starting with -
      safe = safe.replace(/^- (.+)$/gm, '<li>$1</li>');
      safe = safe.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      // Ordered lists: lines starting with number.
      safe = safe.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      // Paragraphs: double newlines
      safe = safe.replace(/\n\n/g, '</p><p>');
      // Single newlines within paragraphs
      safe = safe.replace(/\n/g, '<br>');
      return '<p>' + safe + '</p>';
    }

    function addMessage(text, role) {
      var div = document.createElement('div');
      div.className = 'message ' + role;
      if (role === 'assistant') {
        div.innerHTML = simpleMarkdown(text);
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function send() {
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      addMessage(text, 'user');
      ws.send(JSON.stringify({ text, authToken }));
      input.value = '';
      sendBtn.disabled = true;
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
